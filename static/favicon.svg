<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0c1520"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cfd8dc"/>
      <stop offset="50%" stop-color="#90a4ae"/>
      <stop offset="100%" stop-color="#78909c"/>
    </linearGradient>
    <linearGradient id="steelDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#607d8b"/>
      <stop offset="100%" stop-color="#455a64"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="80" fill="url(#bg)"/>

  <!-- Lock shackle -->
  <path d="M172 240 L172 155 C172 80 340 80 340 155 L340 240"
        fill="none" stroke="url(#steel)" stroke-width="34" stroke-linecap="round"/>

  <!-- Lock body -->
  <rect x="112" y="240" width="288" height="220" rx="28" fill="url(#steel)"/>
  <rect x="126" y="254" width="260" height="192" rx="18" fill="url(#steelDark)" opacity="0.25"/>

  <!-- CZ monogram centered in lock body -->
  <text x="256" y="360" font-family="'Georgia','Times New Roman',serif" font-weight="700"
        font-size="160" fill="#1a2332" text-anchor="middle" dominant-baseline="central"
        letter-spacing="-6">CZ</text>
</svg>
